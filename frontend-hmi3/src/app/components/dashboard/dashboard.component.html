<div class="dashboard-container">
  
  <!-- <header class="dashboard-header">
    <h1>Dashboard</h1>
  </header> -->

  <app-topbar title="Dashboard"></app-topbar>

  <section class="summary-section">
    <div class="summary-card">
      <div class="icon-container total-icon">
        <span>Σ</span>
      </div>
      <div class="stats-info">
        <span class="stat-value">{{ summaryStats.total }}</span>
        <span class="stat-label">TOTAL</span>
      </div>
    </div>
    
    <div class="summary-card active-card">
      <div class="icon-container active-icon">
        <span>!</span>
      </div>
      <div class="stats-info">
        <span class="stat-value">{{ summaryStats.active }}</span>
        <span class="stat-label">ACTIVE</span>
      </div>
    </div>
    
    <div class="summary-card cleared-card">
      <div class="icon-container cleared-icon">
        <span>✓</span>
      </div>
      <div class="stats-info">
        <span class="stat-value">{{ summaryStats.cleared }}</span>
        <span class="stat-label">CLEARED</span>
      </div>
    </div>
  </section>

  <section class="chart-section">
    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Alarm Status Distribution</h3>
        <span class="badge real-time-badge">REAL-TIME</span>
      </div>
      <div class="chart-container donut-chart-container">
        <canvas baseChart
                [data]="donutChartData"
                [labels]="donutChartLabels"
                [options]="donutChartOptions"
                [type]="donutChartType">
        </canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-header">
        <h3>Severity Breakdown</h3>
        <span class="badge last-24h-badge">LAST 24H</span>
      </div>
      <div class="chart-container bar-chart-container">
        <canvas baseChart
                [data]="barChartData"
                [options]="barChartOptions"
                [type]="barChartType">
        </canvas>
      </div>
    </div>
  </section>

</div>
